schema_version = 1
name = "phaseharness"

[workflow]
phase_order = ["clarify", "context_gather", "plan", "generate", "evaluate"]
loop_count = 2
max_attempts_per_phase = 2
commit_mode = "none"
commit_modes = ["none", "final", "phase"]

[hooks]
timeout_sec = 30

[bridges]
skills_mode = "symlink"

[permissions]
profile = "full"

[permissions.claude.settings.permissions]
defaultMode = "bypassPermissions"
allow = []
ask = []
deny = []

[permissions.claude.subagents]
permissionMode = "bypassPermissions"

[permissions.claude.phaseharness]
allowManagedSubagents = true

[permissions.codex.config]
approval_policy = "never"
sandbox_mode = "danger-full-access"

[permissions.codex.config.sandbox_workspace_write]
network_access = true
writable_roots = ["."]
