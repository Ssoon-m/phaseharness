schema_version = 1
default_provider = "auto"
fallback_provider = ""
headless_env = "AGENT_HEADLESS"

[paths]
docs = "docs"
tasks = "tasks"
prompts = ".agent-harness/prompts"
skills = ".agent-harness/skills"
roles = ".agent-harness/roles"

[execution]
session_strategy = "balanced"
session_timeout_sec = 1800
check_timeout_sec = 600
sandbox_mode = "workspace-write"
approval_policy = "never"
prompt_handoff = "stdin"
workflow_max_attempts = 2
phase_max_attempts = 2
evaluation_max_attempts = 2
commit_mode = "none"

[providers.claude]
enabled = true
binary = "claude"

[providers.codex]
enabled = true
binary = "codex"

[bridges]
skills_mode = "symlink"
generate_claude_agents = true
generate_codex_agents = true
